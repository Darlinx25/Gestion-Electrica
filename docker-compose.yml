services:
  mariadb:
    image: mariadb:10.11
    container_name: tallerjava-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: mariapass
      MARIADB_DATABASE: tallerJava
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmariapass"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  wildfly:
    build: .
    container_name: tallerjava-wildfly
    ports:
      - "8080:8080"
      - "9990:9990"
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DB: tallerJava
      MARIADB_USER: root
      MARIADB_PASSWORD: mariapass
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
